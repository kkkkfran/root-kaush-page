<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Pagina personal minimal en negro." />
    <title>Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="screen">
      <a class="avatar-link" id="avatarLink" href="#" aria-label="Perfil de Discord">
        <span class="avatar-frame">
          <img class="avatar" id="avatar" alt="Avatar de Discord" />
          <span class="avatar-fallback" id="avatarFallback" aria-hidden="true">?</span>
        </span>
        <img
          class="avatar-decoration"
          id="avatarDecoration"
          alt=""
          aria-hidden="true"
        />
      </a>
      <h1 aria-label="Nombre">
        <span id="typewriter"></span><span class="cursor" aria-hidden="true"></span>
      </h1>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
